<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alper Kocasalih | Game Designer & Software Developer</title>
    <meta name="description" content="Alper Kocasalih Portfolyosu - Game Designer & Software Developer. Unity, C#, Flutter ve Sistem Tasarımı projeleri.">
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <!-- Controls (Top Right) -->
    <div class="controls-container">
        <div class="language-selector">
            <button class="flag-btn active" data-lang="tr" title="Türkçe">
                <img src="https://flagcdn.com/w80/tr.png" alt="TR">
            </button>
            <button class="flag-btn" data-lang="en" title="English">
                <img src="https://flagcdn.com/w80/gb.png" alt="EN">
            </button>
            <button class="flag-btn" data-lang="es" title="Español">
                <img src="https://flagcdn.com/w80/es.png" alt="ES">
            </button>
        </div>
        <button id="theme-toggle" class="theme-toggle" title="Tema Değiştir">
            <i data-lucide="sun"></i>
        </button>
    </div>

    <!-- Navigation -->
    <nav id="main-nav">
        <!-- Renders dynamically -->
    </nav>

    <main class="main-wrapper">
        <!-- HOME SECTION -->
        <section id="home" class="active">
            <div id="hero-content" class="hero">
                <!-- Renders dynamically -->
            </div>
        </section>

        <!-- PROFILE SECTION -->
        <section id="profile">
            <div class="section-title">
                <h2 data-i18n="profile-title">Kişisel Bilgiler</h2>
                <div class="underline"></div>
            </div>
            <div id="profile-grid" class="card-grid">
                <!-- Renders dynamically -->
            </div>
        </section>

        <!-- EXPERIENCE SECTION -->
        <section id="experience">
            <div class="section-title">
                <h2 data-i18n="exp-title">Deneyim</h2>
                <div class="underline"></div>
            </div>
            <div id="experience-timeline" class="timeline" style="max-width: 800px; margin: 0 auto;">
                <!-- Renders dynamically -->
            </div>
        </section>

        <!-- PROJECTS SECTION -->
        <section id="projects">
            <div class="section-title">
                <h2 data-i18n="projects-title">Öne Çıkan Projeler</h2>
                <div class="underline"></div>
            </div>
            <div id="projects-grid" class="card-grid">
                <!-- Renders dynamically -->
            </div>
        </section>

        <!-- DOCUMENTS SECTION -->
        <section id="documents">
            <div class="section-title">
                <h2 data-i18n="docs-title">Belgeler & Arşiv</h2>
                <div class="underline"></div>
                <p data-i18n="docs-desc" style="margin-top: 15px; color: var(--text-muted);"></p>
            </div>
            <div id="documents-grid" class="card-grid" style="grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));">
                <!-- Renders dynamically -->
            </div>
        </section>
    </main>

    <footer id="main-footer">
        <!-- Renders dynamically -->
    </footer>

    <!-- Project Details Modal -->
    <div id="project-modal" class="modal-overlay">
        <div class="modal-content">
            <button id="modal-close" class="modal-close-btn" title="Kapat">
                <i data-lucide="x"></i>
            </button>
            <div id="modal-body">
                <!-- Renders dynamically -->
            </div>
        </div>
    </div>

    <!-- Lightbox Overlay -->
    <div id="lightbox" class="lightbox-overlay">
        <button id="lightbox-close" class="lightbox-close-btn">&times;</button>
        <img id="lightbox-img" src="" alt="Enlarged view">
    </div>

    <!-- Scripts - Load data first, then logic -->
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
